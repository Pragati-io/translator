<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinguaPetal — Language Translator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--rose:#f4c6cc;--mint:#c7ece4;--lavender:#ddd6f3;--text:#5a4a5a;--soft:#9e8a9e;--card:rgba(255,255,255,0.75);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#fde8ee 0%,#fef3e8 25%,#fdf8e8 50%,#e8f7f2 75%,#eae8f9 100%);min-height:100vh;color:var(--text);padding:2rem 1rem 4rem;}
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none;z-index:0;}
body::before{width:500px;height:500px;background:var(--rose);top:-100px;left:-100px;}
body::after{width:400px;height:400px;background:var(--mint);bottom:-80px;right:-80px;}
.wrap{max-width:740px;margin:0 auto;position:relative;z-index:1;}
header{text-align:center;margin-bottom:2rem;}
header h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,2.8rem);color:var(--text);}
header h1 span{color:#c48a9a;font-style:italic;}
header p{margin-top:.4rem;font-size:.9rem;color:var(--soft);}
.badge{display:inline-block;margin-top:.6rem;background:var(--card);border:1px solid #f0d8e0;border-radius:99px;padding:.2rem .9rem;font-size:.78rem;color:var(--soft);}
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--card);border-radius:16px;padding:.4rem;border:1px solid rgba(255,255,255,.8);}
.tab{flex:1;padding:.6rem;border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--soft);background:transparent;cursor:pointer;transition:all .2s;}
.tab.active{background:linear-gradient(135deg,#f4c6cc,#ddd6f3);color:var(--text);font-weight:500;box-shadow:0 2px 10px rgba(180,140,160,.2);}
.card{background:var(--card);border-radius:24px;padding:1.8rem;backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.8);box-shadow:0 8px 40px rgba(180,140,160,.12);margin-bottom:1.5rem;}
.section{display:none;}.section.active{display:block;}
label{display:block;font-size:.78rem;font-weight:500;color:var(--soft);letter-spacing:.04em;text-transform:uppercase;margin-bottom:.4rem;}
.input-row{position:relative;}
textarea{width:100%;min-height:100px;border:1.5px solid #f0d8e4;border-radius:14px;padding:.9rem 3rem .9rem .9rem;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--text);background:rgba(255,255,255,.6);resize:vertical;outline:none;transition:border .2s;}
textarea:focus{border-color:#c48a9a;background:#fff;}
textarea::placeholder{color:#c5b0c5;}
.mic-btn{position:absolute;right:.7rem;bottom:.7rem;width:36px;height:36px;border-radius:50%;border:none;background:linear-gradient(135deg,#f4c6cc,#ddd6f3);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:transform .15s;}
.mic-btn:hover{transform:scale(1.1);}
.mic-btn.listening{background:linear-gradient(135deg,#ff9a9e,#f4c6cc);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(196,138,154,.4)}50%{box-shadow:0 0 0 8px rgba(196,138,154,0)}}
.lang-picker-btn{width:100%;padding:.8rem 1rem;border-radius:14px;border:1.5px solid #eddee8;background:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s;margin-top:.4rem;}
.lang-picker-btn:hover{border-color:#c48a9a;background:#fff;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(90,74,90,.3);backdrop-filter:blur(6px);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:24px;padding:1.8rem;width:90%;max-width:520px;box-shadow:0 20px 60px rgba(180,140,160,.3);animation:popIn .25s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--text);}
.modal-close{background:none;border:none;font-size:1.4rem;color:var(--soft);cursor:pointer;}
.modal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;}
.modal-lang-btn{padding:.6rem .5rem;border-radius:12px;border:1.5px solid #eddee8;background:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--soft);cursor:pointer;transition:all .18s;text-align:center;}
.modal-lang-btn:hover{border-color:#c48a9a;color:#c48a9a;}
.modal-lang-btn.active{background:linear-gradient(135deg,#f4c6cc,#ddd6f3);border-color:transparent;color:var(--text);font-weight:500;}
.btn-translate{width:100%;margin-top:1rem;padding:.9rem;border:none;border-radius:14px;background:linear-gradient(135deg,#f4c6cc,#ddd6f3);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:500;color:var(--text);cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(180,140,160,.25);}
.btn-translate:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(180,140,160,.35);}
.btn-translate:disabled{opacity:.6;transform:none;cursor:wait;}
.result-box{display:none;margin-top:1rem;padding:1.1rem 1.3rem;background:linear-gradient(135deg,rgba(199,236,228,.4),rgba(221,214,243,.4));border-radius:16px;border:1.5px solid rgba(199,236,228,.6);animation:popIn .3s ease;}
.result-box.show{display:block;}
.result-label{font-size:.72rem;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}
.result-text{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--text);line-height:1.5;}
.result-lang{margin-top:.3rem;font-size:.8rem;color:#c48a9a;}
.result-actions{display:flex;gap:.5rem;margin-top:.8rem;}
.action-btn{padding:.4rem .9rem;border-radius:10px;border:1.5px solid #eddee8;background:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--soft);cursor:pointer;transition:all .15s;}
.action-btn:hover{border-color:#c48a9a;color:#c48a9a;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.section-title{font-family:'Playfair Display',serif;font-size:1.05rem;}
.clear-btn{background:none;border:1.5px solid #eddee8;border-radius:10px;padding:.35rem .8rem;font-size:.78rem;color:var(--soft);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;}
.clear-btn:hover{border-color:#c48a9a;color:#c48a9a;}
.history-list{list-style:none;}
.history-list li{padding:.65rem .9rem;border-radius:12px;background:rgba(255,255,255,.5);margin-bottom:.4rem;font-size:.85rem;border:1px solid rgba(240,216,228,.5);display:flex;align-items:center;gap:.6rem;}
.history-list li .orig{color:var(--soft);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-list li .arrow{color:#c48a9a;flex-shrink:0;}
.history-list li .trans{font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-history{text-align:center;color:var(--soft);font-size:.88rem;padding:1.5rem 0;font-style:italic;}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-bottom:1.2rem;}
.country-btn{padding:.6rem .5rem;border-radius:12px;border:1.5px solid #eddee8;background:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif;font-size:.82rem;color:var(--soft);cursor:pointer;transition:all .18s;text-align:center;}
.country-btn:hover{border-color:#c48a9a;color:#c48a9a;}
.country-btn.active{background:linear-gradient(135deg,#fad7c0,#f4c6cc);border-color:transparent;color:var(--text);font-weight:500;}
.phrase-list{list-style:none;}
.phrase-list li{padding:.7rem 1rem;border-radius:12px;background:rgba(255,255,255,.5);margin-bottom:.4rem;border:1px solid rgba(240,216,228,.5);display:flex;justify-content:space-between;align-items:center;gap:1rem;}
.phrase-list li .en{color:var(--soft);font-size:.85rem;flex:1;}
.phrase-list li .tr{font-weight:500;font-size:.85rem;flex:1;}
.phrase-speak{background:none;border:none;cursor:pointer;font-size:1rem;color:#c48a9a;}
.reverse-input{width:100%;min-height:80px;border:1.5px solid #f0d8e4;border-radius:14px;padding:.9rem;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--text);background:rgba(255,255,255,.6);resize:vertical;outline:none;transition:border .2s;}
.reverse-input:focus{border-color:#c48a9a;background:#fff;}
.reverse-result{display:none;padding:1rem 1.2rem;background:linear-gradient(135deg,rgba(199,236,228,.4),rgba(221,214,243,.4));border-radius:14px;margin-top:.8rem;}
.reverse-result.show{display:block;}
footer{text-align:center;margin-top:1.5rem;font-size:.75rem;color:#c5b0c5;}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#5a4a5a;color:#fff;padding:.6rem 1.4rem;border-radius:99px;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}
.loading{display:inline-block;width:16px;height:16px;border:2px solid #c48a9a;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:.4rem;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lingua<span>Petal</span></h1>
    <p>Translate · Explore · Discover</p>
    <span class="badge">✦ Advanced C Programming Project</span>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('translate',this)">🌸 Translate</button>
    <button class="tab" onclick="switchTab('travel',this)">🌍 Travel</button>
    <button class="tab" onclick="switchTab('reverse',this)">🔄 Reverse</button>
  </div>

  <!-- TRANSLATE -->
  <div class="section active" id="translate">
    <div class="card">
      <label>Type or speak in English</label>
      <div class="input-row">
        <textarea id="inputText" placeholder="Type anything in English…"></textarea>
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="Voice input">🎤</button>
      </div>
      <label style="margin-top:1rem">Target language</label>
      <button class="lang-picker-btn" id="langPickerBtn" onclick="openModal()">
        <span id="selectedLangDisplay">🇪🇸 Spanish</span>
        <span style="color:var(--soft);font-size:.8rem">▼ choose</span>
      </button>
      <button class="btn-translate" id="translateBtn" onclick="doTranslate()">Translate ✦</button>
      <div class="result-box" id="resultBox">
        <div class="result-label">Translation</div>
        <div class="result-text" id="resultText"></div>
        <div class="result-lang" id="resultLang"></div>
        <div class="result-actions">
          <button class="action-btn" onclick="copyTranslation()">📋 Copy</button>
          <button class="action-btn" onclick="speakTranslation()">🔊 Listen</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="section-header">
        <span class="section-title">History</span>
        <button class="clear-btn" onclick="clearHistory()">Clear</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="empty-history">No translations yet 🌸</li>
      </ul>
    </div>
  </div>

  <!-- TRAVEL -->
  <div class="section" id="travel">
    <div class="card">
      <label>Pick a destination</label>
      <div class="country-grid" id="countryGrid"></div>
      <ul class="phrase-list" id="phraseList">
        <li style="color:var(--soft);font-style:italic;padding:.5rem 0">Pick a country to see useful phrases 🌍</li>
      </ul>
    </div>
  </div>

  <!-- REVERSE -->
  <div class="section" id="reverse">
    <div class="card">
      <label>Paste a foreign word or phrase</label>
      <textarea class="reverse-input" id="reverseInput" placeholder="e.g. bonjour, gracias, salom…"></textarea>
      <button class="btn-translate" id="reverseBtn" onclick="doReverse()">Find English meaning ✦</button>
      <div class="reverse-result" id="reverseResult">
        <div class="result-label">English meaning</div>
        <div class="result-text" id="reverseText" style="font-family:'Playfair Display',serif;font-size:1.2rem;margin-top:.3rem;"></div>
      </div>
    </div>
  </div>

  <footer>Made with care · Advanced C Programming · 2025</footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Choose a language</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-grid" id="modalGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const languages=[{name:"Spanish",flag:"🇪🇸",code:"es"},{name:"French",flag:"🇫🇷",code:"fr"},{name:"German",flag:"🇩🇪",code:"de"},{name:"Turkish",flag:"🇹🇷",code:"tr"},{name:"Arabic",flag:"🇸🇦",code:"ar"},{name:"Hindi",flag:"🇮🇳",code:"hi"},{name:"Portuguese",flag:"🇧🇷",code:"pt"},{name:"Russian",flag:"🇷🇺",code:"ru"},{name:"Japanese",flag:"🇯🇵",code:"ja"},{name:"Korean",flag:"🇰🇷",code:"ko"},{name:"Chinese",flag:"🇨🇳",code:"zh"},{name:"Italian",flag:"🇮🇹",code:"it"},{name:"Dutch",flag:"🇳🇱",code:"nl"},{name:"Polish",flag:"🇵🇱",code:"pl"},{name:"Urdu",flag:"🇵🇰",code:"ur"},{name:"Uzbek",flag:"🇺🇿",code:"uz"}];

const travelData={"🇫🇷 France":{code:"fr",phrases:[["Hello","Bonjour"],["Where is the bathroom?","Où sont les toilettes?"],["How much?","Combien ça coûte?"],["I need help","J'ai besoin d'aide"],["I am lost","Je suis perdu"],["Call the police","Appelez la police"],["The bill please","L'addition s'il vous plaît"],["Do you speak English?","Parlez-vous anglais?"],["I am allergic","Je suis allergique"],["Thank you","Merci"]]},"🇪🇸 Spain":{code:"es",phrases:[["Hello","Hola"],["Where is the bathroom?","¿Dónde está el baño?"],["How much?","¿Cuánto cuesta?"],["I need help","Necesito ayuda"],["I am lost","Estoy perdido"],["Call the police","Llame a la policía"],["The bill please","La cuenta por favor"],["Do you speak English?","¿Habla inglés?"],["I am allergic","Soy alérgico"],["Thank you","Gracias"]]},"🇩🇪 Germany":{code:"de",phrases:[["Hello","Hallo"],["Where is the bathroom?","Wo ist die Toilette?"],["How much?","Wie viel kostet das?"],["I need help","Ich brauche Hilfe"],["I am lost","Ich bin verloren"],["Call the police","Rufen Sie die Polizei"],["The bill please","Die Rechnung bitte"],["Do you speak English?","Sprechen Sie Englisch?"],["I am allergic","Ich bin allergisch"],["Thank you","Danke"]]},"🇯🇵 Japan":{code:"ja",phrases:[["Hello","こんにちは"],["Where is the bathroom?","トイレはどこですか？"],["How much?","これはいくらですか？"],["I need help","助けてください"],["I am lost","迷子になりました"],["Call the police","警察を呼んでください"],["The bill please","お会計をお願いします"],["Do you speak English?","英語を話せますか？"],["I am allergic","アレルギーがあります"],["Thank you","ありがとう"]]},"🇰🇷 Korea":{code:"ko",phrases:[["Hello","안녕하세요"],["Where is the bathroom?","화장실이 어디에 있나요?"],["How much?","이것은 얼마예요?"],["I need help","도움이 필요해요"],["I am lost","길을 잃었어요"],["Call the police","경찰을 불러주세요"],["The bill please","계산서 주세요"],["Do you speak English?","영어 하세요?"],["I am allergic","알레르기가 있어요"],["Thank you","감사합니다"]]},"🇹🇷 Turkey":{code:"tr",phrases:[["Hello","Merhaba"],["Where is the bathroom?","Tuvalet nerede?"],["How much?","Bu ne kadar?"],["I need help","Yardıma ihtiyacım var"],["I am lost","Kayboldum"],["Call the police","Polis çağırın"],["The bill please","Hesap lütfen"],["Do you speak English?","İngilizce biliyor musunuz?"],["I am allergic","Alerjim var"],["Thank you","Teşekkür ederim"]]},"🇸🇦 Arabia":{code:"ar",phrases:[["Hello","مرحبا"],["Where is the bathroom?","أين الحمام؟"],["How much?","كم يكلف هذا؟"],["I need help","أحتاج مساعدة"],["I am lost","لقد ضللت الطريق"],["Call the police","اتصل بالشرطة"],["The bill please","الفاتورة من فضلك"],["Do you speak English?","هل تتكلم الإنجليزية؟"],["I am allergic","لدي حساسية"],["Thank you","شكرا"]]},"🇮🇳 India":{code:"hi",phrases:[["Hello","नमस्ते"],["Where is the bathroom?","शौचालय कहाँ है?"],["How much?","यह कितने का है?"],["I need help","मुझे मदद चाहिए"],["I am lost","मैं खो गया हूँ"],["Call the police","पुलिस को बुलाओ"],["The bill please","बिल लाइए"],["Do you speak English?","क्या आप अंग्रेजी बोलते हैं?"],["I am allergic","मुझे एलर्जी है"],["Thank you","धन्यवाद"]]},"🇺🇿 Uzbekistan":{code:"uz",phrases:[["Hello","Salom"],["Where is the bathroom?","Hojatxona qayerda?"],["How much?","Bu qancha turadi?"],["I need help","Menga yordam kerak"],["I am lost","Men adashib qoldim"],["Call the police","Politsiyani chaqiring"],["The bill please","Hisobni bering"],["Do you speak English?","Inglizcha bilasizmi?"],["I am allergic","Mening allergiyam bor"],["Thank you","Rahmat"]]},"🇮🇹 Italy":{code:"it",phrases:[["Hello","Ciao"],["Where is the bathroom?","Dov'è il bagno?"],["How much?","Quanto costa?"],["I need help","Ho bisogno di aiuto"],["I am lost","Mi sono perso"],["Call the police","Chiama la polizia"],["The bill please","Il conto per favore"],["Do you speak English?","Parla inglese?"],["I am allergic","Sono allergico"],["Thank you","Grazie"]]}};

let selectedLang=languages[0], history=[], recognition=null, isListening=false, lastTranslation="";

// build modal
const mg=document.getElementById('modalGrid');
languages.forEach(lang=>{
  const btn=document.createElement('button');
  btn.className='modal-lang-btn'+(lang.name===selectedLang.name?' active':'');
  btn.textContent=lang.flag+' '+lang.name;
  btn.onclick=()=>{
    selectedLang=lang;
    document.querySelectorAll('.modal-lang-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('selectedLangDisplay').textContent=lang.flag+' '+lang.name;
    closeModal();
  };
  mg.appendChild(btn);
});

// build countries
const cg=document.getElementById('countryGrid');
Object.keys(travelData).forEach(country=>{
  const btn=document.createElement('button');
  btn.className='country-btn';
  btn.textContent=country;
  btn.onclick=()=>{document.querySelectorAll('.country-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');showPhrases(country);};
  cg.appendChild(btn);
});

function showPhrases(country){
  const data=travelData[country];
  document.getElementById('phraseList').innerHTML=data.phrases.map(([en,tr])=>`
    <li>
      <span class="en">${en}</span>
      <span class="tr">${tr}</span>
      <button class="phrase-speak" onclick="speak('${tr.replace(/'/g,"\\'").replace(/"/g,'&quot;')}','${data.code}')">🔊</button>
    </li>`).join('');
}

// ── REAL TRANSLATION via MyMemory API ──
async function doTranslate(){
  const input=document.getElementById('inputText').value.trim();
  if(!input)return;
  const btn=document.getElementById('translateBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="loading"></span>Translating…';
  try{
    const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=en|${selectedLang.code}`);
    const data=await res.json();
    const translated=data.responseData.translatedText;
    lastTranslation=translated;
    document.getElementById('resultText').textContent=translated;
    document.getElementById('resultLang').textContent=selectedLang.flag+' '+selectedLang.name;
    document.getElementById('resultBox').classList.add('show');
    history.unshift({orig:input,trans:translated,lang:selectedLang.flag});
    renderHistory();
  }catch(e){
    showToast('Translation failed. Check internet connection.');
  }
  btn.disabled=false;
  btn.innerHTML='Translate ✦';
}

// ── REVERSE via MyMemory API ──
async function doReverse(){
  const input=document.getElementById('reverseInput').value.trim();
  if(!input)return;
  const btn=document.getElementById('reverseBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="loading"></span>Finding meaning…';
  try{
    // try to detect and translate to English
    const res=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(input)}&langpair=autodetect|en`);
    const data=await res.json();
    const result=data.responseData.translatedText;
    document.getElementById('reverseText').textContent=result;
    document.getElementById('reverseResult').classList.add('show');
  }catch(e){
    showToast('Could not find meaning. Check internet connection.');
  }
  btn.disabled=false;
  btn.innerHTML='Find English meaning ✦';
}

function copyTranslation(){
  if(!lastTranslation)return;
  navigator.clipboard.writeText(lastTranslation).then(()=>showToast('Copied! 📋')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=lastTranslation;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Copied! 📋');
  });
}

function speakTranslation(){
  if(!lastTranslation)return;
  speak(lastTranslation,selectedLang.code);
}

function speak(text,lang){
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang;window.speechSynthesis.speak(u);
}

function toggleMic(){
  const SRClass=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SRClass){showToast('Use Chrome for voice input 🎤');return;}
  if(isListening){if(recognition)recognition.stop();return;}
  recognition=new SRClass();
  recognition.lang='en-US';recognition.continuous=false;recognition.interimResults=false;
  recognition.onstart=()=>{isListening=true;document.getElementById('micBtn').classList.add('listening');document.getElementById('micBtn').textContent='⏹';showToast('Listening… speak now 🎤');};
  recognition.onresult=e=>{document.getElementById('inputText').value=e.results[0][0].transcript;doTranslate();};
  recognition.onerror=e=>{showToast('Mic error: '+e.error);isListening=false;document.getElementById('micBtn').classList.remove('listening');document.getElementById('micBtn').textContent='🎤';};
  recognition.onend=()=>{isListening=false;document.getElementById('micBtn').classList.remove('listening');document.getElementById('micBtn').textContent='🎤';};
  try{recognition.start();}catch(e){showToast('Could not start mic');}
}

function renderHistory(){
  const list=document.getElementById('historyList');
  if(history.length===0){list.innerHTML='<li class="empty-history">No translations yet 🌸</li>';return;}
  list.innerHTML=history.slice(0,10).map(h=>`<li><span class="orig">${h.orig}</span><span class="arrow">→</span><span class="trans">${h.trans} <span style="font-size:.72rem">${h.lang}</span></span></li>`).join('');
}

function clearHistory(){history=[];renderHistory();document.getElementById('resultBox').classList.remove('show');}
function openModal(){document.getElementById('modalOverlay').classList.add('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function switchTab(name,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(name).classList.add('active');btn.classList.add('active');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
document.getElementById('inputText').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doTranslate();}});
document.getElementById('reverseInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doReverse();}});
</script>
</body>
</html>
